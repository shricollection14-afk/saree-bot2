name: Saree WhatsApp Sync Bot
on:
  schedule:
    - cron: '30 15 * * *'
  workflow_dispatch:
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - uses: actions/cache@v3
        with:
          path: |
            .wwebjs_auth
            state.json
          key: wa-session-${{ github.run_id }}
          restore-keys: wa-session-
      - run: sudo apt-get update && sudo apt-get install -y libgbm-dev libasound2t64 libnss3 libatk-bridge2.0-0 libgtk-3-0
      - run: npm install
      - run: node scheduled_cloud_bot.js
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
