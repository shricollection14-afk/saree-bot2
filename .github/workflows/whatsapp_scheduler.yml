name: Saree WhatsApp Sync Bot
on:
  schedule:
    - cron: '30 15 * * *'
  workflow_dispatch:
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      
      # BEHTAR CACHE: Isse session yaad rahega
      - name: Restore WhatsApp Session
        uses: actions/cache@v4
        with:
          path: .wwebjs_auth
          key: ${{ runner.os }}-wa-session-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-wa-session-

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - run: npm install
      - run: node scheduled_cloud_bot.js
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
